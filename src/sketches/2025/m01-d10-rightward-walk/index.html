<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rightward walk</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        class Walker {
          constructor() {
            this.x = p.windowWidth / 2
            this.y = p.windowHeight / 2
          }

          step() {
            let r = p.random(1)

            if (r < 0.4) {
              this.x++
            } else if (r < 0.6) {
              this.x--
            } else if (r < 0.8) {
              this.y++
            } else {
              this.y--
            }
          }

          render() {
            p.stroke(0)
            p.circle(this.x, this.y, 5)
          }
        }

        const walker = new Walker()

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          p.background(255)
        }

        p.draw = () => {
          walker.step()
          walker.render()
        }
      })
    </script>
  </body>
</html>
