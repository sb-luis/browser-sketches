<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mover random acc</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        class Mover {
          constructor() {
            this.pos = p.createVector(p.random(p.width), p.random(p.height))
            this.vel = p.createVector(0, 0)
            this.acc = p.createVector(0, 0)
          }

          wrapAroundEdges() {
            if (this.pos.x > p.width) this.pos.x = 0
            else if (this.pos.x < 0) this.pos.x = p.width
            if (this.pos.y > p.height) this.pos.y = 0
            else if (this.pos.y < 0) this.pos.y = p.height
          }

          update() {
            this.acc = p5.Vector.random2D()
            this.acc.mult(0.5)
            this.vel.add(this.acc)
            this.pos.add(this.vel)
            this.vel.limit(10)
          }

          render() {
            p.stroke(0)
            p.noFill()
            p.circle(this.pos.x, this.pos.y, 20)
          }
        }

        let mover

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          mover = new Mover()
        }

        p.draw = () => {
          p.background(255)
          mover.update()
          mover.wrapAroundEdges()
          mover.render()
          p.stroke(255, 0, 0)
          const accDebugScale = 5
          p.line(mover.pos.x, mover.pos.y, mover.pos.x + mover.vel.x * accDebugScale, mover.pos.y + mover.vel.y * accDebugScale)
        }
      })
    </script>
  </body>
</html>
