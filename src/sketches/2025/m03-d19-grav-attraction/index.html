<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grav attraction</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        const G = 1.0
        let mover, attractor

        class Mover {
          constructor(x, y, mass) {
            this.pos = p.createVector(x, y)
            this.vel = p.createVector(0, 0)
            this.acc = p.createVector(0, 0)
            this.mass = mass
          }
          applyForce(force) {
            this.acc.add(p5.Vector.div(force, this.mass))
          }
          update() {
            this.vel.add(this.acc)
            this.pos.add(this.vel)
            this.vel.limit(10)
            this.acc.mult(0)
          }
          render() {
            p.stroke(0); p.noFill()
            p.circle(this.pos.x, this.pos.y, this.mass * 5)
            p.stroke(255, 0, 0)
            p.line(this.pos.x, this.pos.y, this.pos.x + this.vel.x * 5, this.pos.y + this.vel.y * 5)
          }
        }

        class Attractor {
          constructor(x, y) {
            this.pos = p.createVector(x, y)
            this.mass = 20
            this.dragOffset = p.createVector(0, 0)
            this.dragging = false
            this.rollover = false
          }
          computeAttraction(mover) {
            let force = p5.Vector.sub(this.pos, mover.pos)
            let d = p.constrain(force.mag(), 5, 15)
            force.setMag((G * this.mass * mover.mass) / (d * d))
            return force
          }
          render() {
            p.strokeWeight(4); p.stroke(0)
            p.fill(this.dragging ? 50 : this.rollover ? 100 : [175, 200])
            p.circle(this.pos.x, this.pos.y, this.mass * 2)
            p.strokeWeight(1)
          }
          handlePress(mx, my) {
            if (p.dist(mx, my, this.pos.x, this.pos.y) < this.mass) {
              this.dragging = true
              this.dragOffset.set(this.pos.x - mx, this.pos.y - my)
            }
          }
          handleHover(mx, my) {
            this.rollover = p.dist(mx, my, this.pos.x, this.pos.y) < this.mass
          }
          handleDrag(mx, my) {
            if (this.dragging) this.pos.set(mx + this.dragOffset.x, my + this.dragOffset.y)
          }
          stopDragging() { this.dragging = false }
        }

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          mover = new Mover(300, 50, 2)
          attractor = new Attractor(p.width * 0.5, p.height * 0.5)
        }

        p.draw = () => {
          p.background(200)
          mover.applyForce(attractor.computeAttraction(mover))
          mover.update()
          attractor.render()
          mover.render()
        }

        p.mouseMoved  = () => attractor.handleHover(p.mouseX, p.mouseY)
        p.mousePressed = () => attractor.handlePress(p.mouseX, p.mouseY)
        p.mouseDragged = () => { attractor.handleHover(p.mouseX, p.mouseY); attractor.handleDrag(p.mouseX, p.mouseY) }
        p.mouseReleased = () => attractor.stopDragging()
      })
    </script>
  </body>
</html>
