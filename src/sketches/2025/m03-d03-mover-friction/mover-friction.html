<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mover friction</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        class Mover {
          constructor(mass) {
            this.mass = mass
            this.radius = mass * 5
            this.pos = p.createVector(p.random(p.width), this.radius)
            this.vel = p.createVector(0, 0)
            this.acc = p.createVector(0, 0)
          }

          applyForce(force) {
            const newForce = p5.Vector.div(force, this.mass)
            this.acc.add(newForce)
          }

          contactSurface() {
            return this.pos.y > p.height - this.radius - 1
          }

          bounceAtEdges() {
            let bounce = -0.8
            if (this.pos.x > p.width - this.radius) {
              this.pos.x = p.width - this.radius
              this.vel.x *= bounce
            } else if (this.pos.x < this.radius) {
              this.pos.x = this.radius
              this.vel.x *= bounce
            }
            if (this.pos.y > p.height - this.radius) {
              this.pos.y = p.height - this.radius
              this.vel.y *= bounce
            } else if (this.pos.y < this.radius) {
              this.pos.y = this.radius
              this.vel.y *= bounce
            }
          }

          update() {
            this.vel.add(this.acc)
            this.pos.add(this.vel)
            this.vel.limit(10)
            this.acc.mult(0)
          }

          render() {
            p.stroke(0)
            p.noFill()
            p.circle(this.pos.x, this.pos.y, this.radius * 2)
            p.stroke(255, 0, 0)
            const s = 5
            p.line(this.pos.x, this.pos.y, this.pos.x + this.vel.x * s, this.pos.y + this.vel.y * s)
          }
        }

        const gravity = p.createVector(0, 0.98)
        let mover

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          mover = new Mover(5)
        }

        p.draw = () => {
          p.background(255)
          if (p.mouseIsPressed) {
            mover.applyForce(p.createVector(0.5, 0))
          }
          if (mover.contactSurface()) {
            let friction = mover.vel.copy()
            friction.mult(-1).normalize().mult(0.01)
            mover.applyForce(friction)
          }
          mover.applyForce(gravity)
          mover.update()
          mover.bounceAtEdges()
          mover.render()
        }
      })
    </script>
  </body>
</html>
