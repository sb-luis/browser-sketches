<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gaussian walker</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        class Walker {
          constructor() {
            this.x = p.windowWidth / 2
            this.y = p.windowHeight / 2
          }

          step() {
            const mean = 5
            const stdDev = 2
            let speed = stdDev * p.randomGaussian() + mean

            let xstep = p.random(-1, 1)
            let ystep = p.random(-1, 1)

            this.x += xstep * speed
            this.y += ystep * speed
          }

          render() {
            p.stroke(0)
            p.circle(this.x, this.y, 5)
          }
        }

        const walker = new Walker()

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          p.background(255)
        }

        p.draw = () => {
          p.background(255)
          walker.step()
          walker.render()
        }
      })
    </script>
  </body>
</html>
