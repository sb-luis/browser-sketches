<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>edge bounce</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        class Mover {
          constructor() {
            this.pos = p.createVector(p.random(p.width), p.random(p.height))
            this.vel = p.createVector(p.random(-20, 20), p.random(-20, 20))
            this.acc = p.createVector(0.1, 0.1)
          }

          bounceAtEdges() {
            if (this.pos.x > p.width || this.pos.x < 0) this.vel.x *= -1
            else if (this.pos.y > p.height || this.pos.y < 0) this.vel.y *= -1
          }

          update() {
            this.vel.add(this.acc)
            this.pos.add(this.vel)
            this.vel.limit(10)
          }

          render() {
            p.stroke(0)
            p.fill(175)
            p.circle(this.pos.x, this.pos.y, 48)
          }
        }

        let mover

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          mover = new Mover()
        }

        p.draw = () => {
          p.background(255)
          mover.update()
          mover.bounceAtEdges()
          mover.render()
        }
      })
    </script>
  </body>
</html>
