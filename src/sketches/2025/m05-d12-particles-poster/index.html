<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>particles poster</title>
  <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script>
// -- TWEAK VARIABLES --
let rotMult = 1.75;
let xVel = 22
let yVel = 10
let textSize = 45;
let textCol = 15;
let titleCol = 26;
let bgCol = 255;
let maxParticles = 30;
let maxParticlesPerCycle = 1;
let timeAlive = 30

// -- PARENT PARTICLE CLASS --
class Particle {
  constructor(x, y) {
    this.startPosition = createVector(x, y);
    this.gravity = createVector(0, 0.05);
    this.mass = 10;
    this.init(x,y);
  }
  init(x,y){
    this.position = createVector(x, y);
    this.acceleration = createVector();
    this.velocity = createVector(random(-xVel, xVel), random(-yVel, yVel));
    this.lifespan = timeAlive; // from 255 to 0 so it can be used as alpha
  }
  update() {
    this.velocity.add(this.acceleration);
    this.position.add(this.velocity);
    this.lifespan -= 2.0;
  }
  applyForce(force) {
    let f = force.copy();
    f.div(this.mass);
    this.acceleration.add(f);
  }
  isDead() {
    return (this.lifespan < 0);
  }
  show() {
    noStroke();
    fill(175, this.lifespan);
    circle(this.position.x, this.position.y, 8);
  }
  run(){
    this.applyForce(this.gravity);
    this.update();
    this.show();
  }
  cleanUp(x,y){
    this.init(x || this.startPosition.x, y || this.startPosition.y);
  }
}

// -- LETTER PARTICLE --
class Letter extends Particle {
  constructor(x, y) {
    super(x,y);
    this.chars = "CREATIVE,CODING,BOOKCLUB,PARTICLES".split(",")
    this.startPosition = createVector(x, y);
    this.gravity = createVector(0, 0.05);
    this.mass = 10;
    this.init(x, y)
  }
  init(x,y){
    super.init(x,y);
    if(!this.chars) return;
    this.char = this.chars[floor(random(0, this.chars.length))];
  }
  show() {
    let angle = map(this.position.x, 0, width, 0, TWO_PI * 2 * rotMult);
    rectMode(CENTER);
    noFill()
    stroke(255 - this.lifespan * textCol);
    strokeWeight(2)
    push();
    translate(this.position.x, this.position.y);
    rotate(angle);
    textFont("Courier New", textSize);
    textAlign(CENTER);
    text(this.char || "C", 0, 0);
    pop();
  }
}

// -- PARTICLE SYSTEM CLASS --
class Emitter {
  constructor(x, y) {
    this.origin = createVector(x, y);
    this.particles = [];
    this.particlesPool = [];
    this.particlesProduced = 0;
    this.particlesRecycled = 0;
    this.particlesDisposed = 0;
    this.objectPooling = true;
  }

  produceParticle(){
    this.particles.push(new Letter(random(0, width), random(0, height)));
    this.particlesProduced += 1;
  }

  disposeParticle(i){
    this.particles.splice(i, 1);
    this.particlesDisposed += 1;
  }

  recycleParticle(i){
    if(this.particlesPool.length){
      const p = this.particlesPool.pop();
      this.particles.push(p)
      this.particlesRecycled += 1;
    }else{
      this.produceParticle()
    }
  }

  addParticle() {
    if(this.objectPooling){
      this.recycleParticle();
    }else{
      this.produceParticle();
    }
  }

  removeParticle(i){
    if(this.objectPooling){
      let p = this.particles.splice(i, 1);
      p[0].cleanUp(random(0, width), random(0, height));
      this.particlesPool.push(p[0]);
    }else{
      this.disposeParticle(i);
    }
  }

  run() {
    stroke(0, 255);
    fill(175, 255);
    let length = this.particles.length - 1;
    for (let i = length; i >= 0; i--) {
      let particle = this.particles[i];
      particle.run();
      if (particle.isDead()) {
        this.removeParticle(i);
        // this.addParticle();
      }
    }
  }
}

// -- HELPER FNS --
function writeBookclubText(){
  fill(titleCol)
  stroke(titleCol)
  strokeWeight(20);
  textFont("Courier New", 184);
  textAlign(CENTER);
  text("26 June", windowWidth * 0.5, windowHeight * 0.5);
}

function writeParticleStats(system){
  fill("black");
  noStroke();
  textFont("Courier New", 12);
  textAlign(RIGHT);
  text(`produced: ${system.particlesProduced}, disposed: ${system.particlesDisposed}, recycled: ${system.particlesRecycled}`, windowWidth * 0.99, windowHeight * 0.99);
}

// -- SETUP --
function setup() {
  createCanvas(windowWidth, windowHeight);
  background(bgCol)
  emitter = new Emitter(width / 2, height / 2);
  for(let i = 0; i < maxParticles; i++){
    this.emitter.addParticle()
  }
}

// -- DRAW LOOP --
function draw() {

  writeParticleStats(emitter);
  emitter.run();
  writeBookclubText()

  let particlesProduced = 0;
}
  </script>
</body>
</html>
