<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>add-remove-2</title>
  <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
  <script type="module">
    import * as THREE from 'three'
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

    class Game {
      constructor(size, divisions) {
        this.cells = []
        this.gridSize = size
        this.gridDivisions = divisions
        this.cellSize = size / divisions
        this.mouse = new THREE.Vector2()
        this.cursor = new THREE.Vector3()
        this.planeXZ = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0)
        this.raycaster = new THREE.Raycaster()
      }

      start() {
        this.createScene()
        this.createGeometry()
        this.createEventListeners()
        this.renderer.setAnimationLoop(this.update.bind(this))
      }

      update() {
        this.renderer.render(this.scene, this.camera)
        this.orbitControls.update()
      }

      createScene() {
        this.renderer = new THREE.WebGLRenderer()
        this.renderer.setSize(window.innerWidth, window.innerHeight)
        this.renderer.setClearColor(0xaaaaaa)
        document.body.appendChild(this.renderer.domElement)

        const light = new THREE.HemisphereLight(0xb1e1ff, 0xb97a20, 1)

        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 500)
        this.orbitControls = new OrbitControls(this.camera, this.renderer.domElement)
        this.orbitControls.enableZoom = false
        this.orbitControls.enablePan = false
        this.orbitControls.enableDamping = true
        this.orbitControls.dampingFactor = 0.05
        this.orbitControls.minPolarAngle = 0
        this.orbitControls.maxPolarAngle = Math.PI / 3
        this.camera.position.set(20, 10, 20)
        this.camera.lookAt(0, 0, 0)
        this.orbitControls.update()

        this.scene = new THREE.Scene()
        this.scene.add(light)
      }

      createGeometry() {
        this.materials = {}
        this.meshes = {}

        const cursorGeo = new THREE.BoxGeometry(this.cellSize, this.cellSize, this.cellSize)
        this.materials.cursor = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
        this.meshes.cursor = new THREE.Mesh(cursorGeo, this.materials.cursor)
        this.scene.add(this.meshes.cursor)

        this.meshes.voxel = new THREE.BoxGeometry(this.cellSize, this.cellSize, this.cellSize)
        this.materials.voxel = new THREE.MeshToonMaterial()

        this.cellMaterials = {
          active: new THREE.MeshToonMaterial({ color: 0xffffff }),
          inactive: new THREE.MeshToonMaterial({ color: 0xbbbbbb })
        }
        this.planeGeometry = new THREE.PlaneGeometry(this.cellSize * 0.05, this.cellSize * 0.05)
        this.prevActiveCell = null
        this.drawGrid(this.scene)
      }

      setCursor(clientX, clientY) {
        this.mouse.x = (clientX / window.innerWidth) * 2 - 1
        this.mouse.y = -(clientY / window.innerHeight) * 2 + 1
        this.raycaster.setFromCamera(this.mouse, this.camera)

        const voxels = this.cells.map((cell) => cell.data.voxel).filter((v) => v)
        const voxelsIntersects = this.raycaster.intersectObjects([...voxels])
        const planeIntersect = this.raycaster.ray.intersectPlane(this.planeXZ, new THREE.Vector3())

        if (voxelsIntersects.length > 0) {
          const intersect = voxelsIntersects[0]
          const cell = this.cells.find((cell) => cell.data.voxel === intersect.object)
          if (cell) {
            this.cursor.set(cell.pos.x, cell.pos.y + this.cellSize * 0.5, cell.pos.z)
            this.meshes.cursor.position.set(cell.pos.x, cell.pos.y + this.cellSize * 0.5, cell.pos.z)
            this.focusCell(cell)
          }
        } else if (planeIntersect) {
          let x = Math.floor(planeIntersect.x / this.cellSize) * this.cellSize + this.cellSize / 2
          let z = Math.floor(planeIntersect.z / this.cellSize) * this.cellSize + this.cellSize / 2
          const y = this.cellSize / 2
          this.cursor.set(x, y, z)
          const cell = this.getVoxel(this.cursor)
          if (cell) {
            if (this.meshes.cursor.material.opacity === 0) this.meshes.cursor.material.opacity = 0.2
            this.meshes.cursor.position.set(x, y, z)
            this.focusCell(cell)
          }
        }
      }

      createEventListeners() {
        window.addEventListener('resize', () => {
          const width = window.innerWidth
          const height = window.innerHeight
          this.renderer.setSize(width, height)
          this.camera.aspect = width / height
          this.camera.updateProjectionMatrix()
        })

        window.addEventListener('click', (event) => {
          this.setCursor(event.clientX, event.clientY)
          const cell = this.getVoxel(this.cursor)
          if (cell?.data.voxel) {
            this.scene.remove(cell.data.voxel)
            cell.data.voxel = null
          } else if (cell?.data && !cell.data.voxel) {
            cell.data.voxel = new THREE.Mesh(this.meshes.voxel, this.materials.voxel)
            cell.data.voxel.position.set(this.cursor.x, this.cursor.y, this.cursor.z)
            this.scene.add(cell.data.voxel)
          }
        })
      }

      drawGrid(scene) {
        const contourMat = new THREE.LineDashedMaterial({ color: 0xffffff, scale: 1, dashSize: 1, gapSize: 0.5 })
        const contour = [
          new THREE.Vector3(-this.gridSize / 2, 0, -this.gridSize / 2),
          new THREE.Vector3(this.gridSize / 2, 0, -this.gridSize / 2),
          new THREE.Vector3(this.gridSize / 2, 0, this.gridSize / 2),
          new THREE.Vector3(-this.gridSize / 2, 0, this.gridSize / 2),
          new THREE.Vector3(-this.gridSize / 2, 0, -this.gridSize / 2)
        ]
        this.line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(contour), contourMat)
        this.line.computeLineDistances()
        scene.add(this.line)

        const divisionsMat = new THREE.LineBasicMaterial({ color: 0xbbbbbb })
        for (let i = 0; i < this.gridDivisions; i++) {
          const hPts = [
            new THREE.Vector3(-this.gridSize / 2, 0, -this.gridSize / 2 + i * this.cellSize),
            new THREE.Vector3(this.gridSize / 2, 0, -this.gridSize / 2 + i * this.cellSize)
          ]
          if (i !== 0) scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(hPts), divisionsMat))

          for (let j = 0; j < this.gridDivisions; j++) {
            const vPts = [
              new THREE.Vector3(-this.gridSize / 2 + j * this.cellSize, 0, -this.gridSize / 2),
              new THREE.Vector3(-this.gridSize / 2 + j * this.cellSize, 0, this.gridSize / 2)
            ]
            if (j !== 0) scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(vPts), divisionsMat))

            const position = new THREE.Vector3(
              -this.gridSize * 0.5 + j * this.cellSize + this.cellSize / 2,
              0,
              -this.gridSize * 0.5 + i * this.cellSize + this.cellSize / 2
            )
            this.cells.push({ pos: position, data: { active: false } })
          }
        }
      }

      focusCell(cell) {
        if (this.prevActiveCell === cell) return
        for (const c of this.cells) {
          c.data.active = false
          if (c.data.voxel && c.data.voxel.material !== this.cellMaterials.inactive) {
            c.data.voxel.material = this.cellMaterials.inactive
          }
        }
        cell.data.active = true
        if (cell.data.voxel) cell.data.voxel.material = this.cellMaterials.active
        this.prevActiveCell = cell
      }

      getVoxel(position) {
        for (const cell of this.cells) {
          if (
            position.x >= cell.pos.x - this.cellSize / 2 &&
            position.x <= cell.pos.x + this.cellSize / 2 &&
            position.z >= cell.pos.z - this.cellSize / 2 &&
            position.z <= cell.pos.z + this.cellSize / 2
          ) return cell
        }
      }
    }

    const game = new Game(8, 4)
    game.start()
  </script>
</body>
</html>
