<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wall wander</title>
  <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script>
    new p5(function(p) {
      let vehicle
      let debug = true

      p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight)
        vehicle = new Vehicle(p.width / 2, p.height / 2)
      }

      p.draw = () => {
        p.background(200)
        vehicle.wander()
        vehicle.boundaries(100)
        vehicle.update()
        vehicle.render()
      }

      class Vehicle {
        constructor(x, y) {
          this.position = p.createVector(x, y)
          this.velocity = p.createVector()
          this.acceleration = p.createVector()
          this.maxSpeed = 8
          this.maxForce = 0.5
          this.mass = 1
          this.r = 8
          this.wanderTheta = 0.0
        }

        wander() {
          let wanderR = 25
          let wanderD = 80
          let change = 0.3
          this.wanderTheta += p.random(-change, change)

          let circlePos = this.velocity.copy()
          circlePos.normalize()
          circlePos.mult(wanderD)
          circlePos.add(this.position)

          let h = this.velocity.heading()
          let circleOffset = p.createVector(
            wanderR * p.cos(this.wanderTheta + h),
            wanderR * p.sin(this.wanderTheta + h)
          )

          let target = p5.Vector.add(circlePos, circleOffset)
          this.seek(target)

          if (debug) {
            p.stroke(0)
            p.noFill()
            p.strokeWeight(1)
            p.circle(circlePos.x, circlePos.y, wanderR * 2)
            p.circle(target.x, target.y, 4)
            p.line(this.position.x, this.position.y, circlePos.x, circlePos.y)
            p.line(circlePos.x, circlePos.y, target.x, target.y)
          }
        }

        boundaries(offset) {
          let desired = null

          if (this.position.x < offset) {
            desired = p.createVector(this.maxSpeed, this.velocity.y)
          } else if (this.position.x > p.width - offset) {
            desired = p.createVector(-this.maxSpeed, this.velocity.y)
          }

          if (this.position.y < offset) {
            desired = p.createVector(this.velocity.x, this.maxSpeed)
          } else if (this.position.y > p.height - offset) {
            desired = p.createVector(this.velocity.x, -this.maxSpeed)
          }

          if (desired !== null) {
            desired.normalize()
            desired.mult(this.maxSpeed)
            let steer = p5.Vector.sub(desired, this.velocity)
            steer.limit(this.maxForce)
            this.applyForce(steer)
          }

          if (debug) {
            p.noFill()
            p.rect(offset * 0.5, offset * 0.5, p.width - offset, p.height - offset)
          }
        }

        seek(target) {
          const desired = p5.Vector.sub(target, this.position)

          const d = desired.mag()
          if (d < 100) {
            const m = p.map(d, 0, 100, 0, this.maxSpeed)
            desired.setMag(m)
          } else {
            desired.setMag(this.maxSpeed)
          }
          const steer = p5.Vector.sub(desired, this.velocity)
          steer.limit(this.maxForce)
          this.applyForce(steer)
        }

        applyForce(force) {
          const newForce = p5.Vector.div(force, this.mass)
          this.acceleration.add(newForce)
        }

        update() {
          this.velocity.add(this.acceleration)
          this.position.add(this.velocity)
          this.acceleration.mult(0)
        }

        render() {
          let angle = this.velocity.heading()
          p.fill(127)
          p.push()
          p.translate(this.position.x, this.position.y)
          p.rotate(angle)
          p.beginShape()
          p.vertex(this.r * 1.25, 0)
          p.vertex(-this.r * 1.25, -this.r)
          p.vertex(-this.r * 1.25, this.r)
          p.endShape(p.CLOSE)
          p.pop()
        }
      }
    })
  </script>
</body>
</html>
