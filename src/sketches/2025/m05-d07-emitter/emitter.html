<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>emitter</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        let emitter, emitter2
        const gravity = p.createVector(0, 0.1)

        class Particle {
          constructor(x, y) {
            this.position = p.createVector(x, y)
            this.velocity = p.createVector(p.random(-1, 1), p.random(-2, 0))
            this.acceleration = p.createVector()
            this.lifespan = 255
          }
          applyForce(force) { this.acceleration.add(force) }
          update() {
            this.velocity.add(this.acceleration)
            this.position.add(this.velocity)
            this.acceleration.mult(0)
            this.lifespan -= 2
          }
          isDead() { return this.lifespan < 0 }
          render() {
            p.stroke(0, this.lifespan)
            p.fill(255, this.lifespan)
            p.circle(this.position.x, this.position.y, 8)
          }
        }

        class Charcoal extends Particle {
          constructor(x, y) {
            super(x, y)
            this.color = [p.random(255), p.random(255), p.random(255)]
          }
          render() {
            const angle = p.map(this.position.x, 0, p.width, 0, p.TWO_PI * 2)
            p.noStroke()
            p.fill(this.color[0], this.color[1], this.color[2], this.lifespan)
            p.push()
            p.translate(this.position.x, this.position.y)
            p.rotate(angle)
            p.rectMode(p.CENTER)
            p.square(0, 0, 8)
            p.pop()
          }
        }

        class Emitter {
          constructor(x, y, ParticleClass = Particle) {
            this.position = p.createVector(x, y)
            this.particles = []
            this.ParticleClass = ParticleClass
          }
          run() {
            this.particles.push(new this.ParticleClass(this.position.x, this.position.y))
            for (let i = this.particles.length - 1; i >= 0; i--) {
              const particle = this.particles[i]
              particle.update()
              particle.render()
              particle.applyForce(gravity)
              if (particle.isDead()) this.particles.splice(i, 1)
            }
          }
        }

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          emitter  = new Emitter(p.width / 2, 20)
          emitter2 = new Emitter(p.width / 2 - 100, 220, Charcoal)
        }

        p.draw = () => {
          p.background(200)
          emitter.run()
          emitter2.run()
        }
      })
    </script>
  </body>
</html>
