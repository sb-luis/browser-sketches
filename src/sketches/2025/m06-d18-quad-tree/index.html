<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>quad tree</title>
  <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script>
    new p5(function(p) {
      let qtree

      p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight)

        let boundary = new Rectangle(p.width / 2, p.height / 2, p.width, p.height)
        qtree = new QuadTree(boundary, 8)
        for (let i = 0; i < 2000; i++) {
          let x = p.randomGaussian(p.width / 2, p.width / 8)
          let y = p.randomGaussian(p.height / 2, p.height / 8)
          let pt = new Point(x, y)
          qtree.insert(pt)
        }
      }

      p.draw = () => {
        p.background(255)
        qtree.show()

        p.rectMode(p.CENTER)
        let range = new Rectangle(p.mouseX, p.mouseY, 50, 50)

        if (p.mouseX < p.width && p.mouseY < p.height) {
          p.strokeWeight(2)
          p.stroke(255, 50, 50)
          p.fill(255, 50, 50, 50)
          p.rect(range.x, range.y, range.w * 2, range.h * 2)
          let points = qtree.query(range)
          for (let pt of points) {
            p.strokeWeight(3)
            p.stroke(50, 50, 50)
            p.point(pt.x, pt.y)
          }
        }
      }

      class Point {
        constructor(x, y) {
          this.x = x
          this.y = y
        }
      }

      class Rectangle {
        constructor(x, y, w, h) {
          this.x = x
          this.y = y
          this.w = w
          this.h = h
        }

        contains(point) {
          return (
            point.x >= this.x - this.w &&
            point.x < this.x + this.w &&
            point.y >= this.y - this.h &&
            point.y < this.y + this.h
          )
        }

        intersects(range) {
          return !(
            range.x - range.w > this.x + this.w ||
            range.x + range.w < this.x - this.w ||
            range.y - range.h > this.y + this.h ||
            range.y + range.h < this.y - this.h
          )
        }
      }

      class QuadTree {
        constructor(boundary, n) {
          this.boundary = boundary
          this.capacity = n
          this.points = []
          this.divided = false
        }

        subdivide() {
          let x = this.boundary.x
          let y = this.boundary.y
          let w = this.boundary.w
          let h = this.boundary.h
          this.northeast = new QuadTree(new Rectangle(x + w / 2, y - h / 2, w / 2, h / 2), this.capacity)
          this.northwest = new QuadTree(new Rectangle(x - w / 2, y - h / 2, w / 2, h / 2), this.capacity)
          this.southeast = new QuadTree(new Rectangle(x + w / 2, y + h / 2, w / 2, h / 2), this.capacity)
          this.southwest = new QuadTree(new Rectangle(x - w / 2, y + h / 2, w / 2, h / 2), this.capacity)
          this.divided = true
        }

        insert(point) {
          if (!this.boundary.contains(point)) return false

          if (this.points.length < this.capacity) {
            this.points.push(point)
            return true
          } else {
            if (!this.divided) this.subdivide()
            if (this.northeast.insert(point)) return true
            else if (this.northwest.insert(point)) return true
            else if (this.southeast.insert(point)) return true
            else if (this.southwest.insert(point)) return true
          }
        }

        query(range, found) {
          if (!found) found = []
          if (!this.boundary.intersects(range)) return
          for (let pt of this.points) {
            if (range.contains(pt)) found.push(pt)
          }
          if (this.divided) {
            this.northwest.query(range, found)
            this.northeast.query(range, found)
            this.southwest.query(range, found)
            this.southeast.query(range, found)
          }
          return found
        }

        show() {
          p.stroke(0)
          p.noFill()
          p.strokeWeight(1)
          p.rectMode(p.CENTER)
          p.rect(this.boundary.x, this.boundary.y, this.boundary.w * 2, this.boundary.h * 2)
          for (let pt of this.points) {
            p.strokeWeight(1)
            p.stroke(0)
            p.point(pt.x, pt.y)
          }
          if (this.divided) {
            this.northeast.show()
            this.northwest.show()
            this.southeast.show()
            this.southwest.show()
          }
        }
      }
    })
  </script>
</body>
</html>
