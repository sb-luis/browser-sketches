<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mover forces</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        class Mover {
          constructor(mass) {
            this.pos = p.createVector(p.random(p.width), p.random(p.height))
            this.vel = p.createVector(0, 0)
            this.acc = p.createVector(0, 0)
            this.mass = mass
          }

          applyForce(force) {
            const newForce = p5.Vector.div(force, this.mass)
            this.acc.add(newForce)
          }

          bounceAtEdges() {
            if (this.pos.x > p.width || this.pos.x < 0) this.vel.x *= -1
            else if (this.pos.y > p.height || this.pos.y < 0) this.vel.y *= -1
          }

          update() {
            this.vel.add(this.acc)
            this.pos.add(this.vel)
            this.vel.limit(10)
            this.acc.mult(0)
          }

          render() {
            p.stroke(0)
            p.noFill()
            p.circle(this.pos.x, this.pos.y, this.mass * 5)
            p.stroke(255, 0, 0)
            const s = 5
            p.line(this.pos.x, this.pos.y, this.pos.x + this.vel.x * s, this.pos.y + this.vel.y * s)
          }
        }

        const gravity = p.createVector(0, 0.5)
        let moverA, moverB

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          moverA = new Mover(5)
          moverB = new Mover(9)
        }

        p.draw = () => {
          p.background(255)
          if (p.mouseIsPressed) {
            let wind = p.createVector(0.5, 0)
            moverA.applyForce(wind)
            moverB.applyForce(wind)
          }
          moverA.applyForce(gravity)
          moverA.update()
          moverA.bounceAtEdges()
          moverA.render()

          moverB.applyForce(gravity)
          moverB.update()
          moverB.bounceAtEdges()
          moverB.render()
        }
      })
    </script>
  </body>
</html>
