<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bouncing ball 2d</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        let x = 100
        let y = 100
        let xspeed = 2.5
        let yspeed = 2

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          p.background(255)
        }

        p.draw = () => {
          p.background(255)
          x = x + xspeed
          y = y + yspeed
          if (x > p.width || x < 0) xspeed = xspeed * -1
          if (y > p.height || y < 0) yspeed = yspeed * -1
          p.stroke(0)
          p.fill(127)
          p.circle(x, y, 48)
        }
      })
    </script>
  </body>
</html>
