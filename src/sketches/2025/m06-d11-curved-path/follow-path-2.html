<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>follow-path-2</title>
  <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script>
    new p5(function(p) {
      let path
      let vehicles = []
      let debug = true

      p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight)
        path = new Path()
        const yOffset = 200
        const points = 5
        for (let i = 0; i < points; i++) {
          const xSpacing = p.width / (points - 1)
          const point = p.createVector(i * xSpacing, p.random(yOffset, p.height - yOffset))
          path.addPoint(point.x, point.y)
        }
        vehicles.push(new Vehicle(100, p.height / 2, 2, 0.2))
        vehicles.push(new Vehicle(50, p.height / 2, 3, 0.05))
      }

      p.draw = () => {
        p.background(200)
        path.render()
        for (let i = 0; i < vehicles.length; i++) {
          vehicles[i].follow(path)
          vehicles[i].wrapAoundEdges()
          vehicles[i].update()
          vehicles[i].render()
        }
      }

      function getNormalPoint(position, a, b) {
        let vectorA = p5.Vector.sub(position, a)
        let vectorB = p5.Vector.sub(b, a)
        vectorB.normalize()
        vectorB.mult(vectorA.dot(vectorB))
        let normalPoint = p5.Vector.add(a, vectorB)
        return normalPoint
      }

      class Path {
        constructor() {
          this.radius = 10
          this.points = []
        }

        addPoint(x, y) {
          this.points.push(p.createVector(x, y))
        }

        render() {
          p.strokeWeight(this.radius * 2)
          p.stroke(180)
          p.noFill()
          p.beginShape()
          for (let i = 0; i < this.points.length; i++) {
            p.vertex(this.points[i].x, this.points[i].y)
          }
          p.endShape()
          p.stroke(0)
          p.strokeWeight(1)
          p.beginShape()
          for (let i = 0; i < this.points.length; i++) {
            p.vertex(this.points[i].x, this.points[i].y)
          }
          p.endShape()
        }
      }

      class Vehicle {
        constructor(x, y, maxSpeed, maxForce) {
          this.position = p.createVector(x, y)
          this.velocity = p.createVector(p.random(), p.random())
          this.acceleration = p.createVector()
          this.maxSpeed = maxSpeed
          this.maxForce = maxForce
          this.mass = 1
          this.r = 8
          this.wanderTheta = 0.0
        }

        follow(path) {
          let future = this.velocity.copy()
          future.setMag(50)
          future.add(this.position)

          let target = null
          let normal = null
          let worldRecord = Infinity

          for (let i = 0; i < path.points.length - 1; i++) {
            let a = path.points[i]
            let b = path.points[i + 1]
            let normalPoint = getNormalPoint(future, a, b)
            if (normalPoint.x < a.x || normalPoint.x > b.x) {
              normalPoint = b.copy()
            }
            let distance = p5.Vector.dist(future, normalPoint)
            if (distance < worldRecord) {
              worldRecord = distance
              normal = normalPoint
              target = normalPoint.copy()
              let dir = p5.Vector.sub(b, a)
              dir.setMag(50)
              target.add(dir)
            }
          }

          if (worldRecord > path.radius && target !== null) {
            this.seek(target)
          }

          if (debug) {
            p.stroke(0)
            p.fill(127)
            p.line(this.position.x, this.position.y, future.x, future.y)
            p.ellipse(future.x, future.y, 4, 4)
            p.stroke(0)
            p.fill(127)
            p.circle(normal.x, normal.y, 4)
            p.line(future.x, future.y, normal.x, normal.y)
            if (worldRecord > path.radius) p.fill(255, 0, 0)
            p.noStroke()
            p.circle(target.x, target.y, 8)
          }
        }

        wrapAoundEdges() {
          if (this.position.x > p.width) this.position.x = 0
          else if (this.position.x < 0) this.position.x = p.width
          if (this.position.y > p.height) this.position.y = 0
          else if (this.position.y < 0) this.position.y = p.height
        }

        seek(target) {
          const desired = p5.Vector.sub(target, this.position)
          const d = desired.mag()
          if (d < 100) {
            const m = p.map(d, 0, 100, 0, this.maxSpeed)
            desired.setMag(m)
          } else {
            desired.setMag(this.maxSpeed)
          }
          const steer = p5.Vector.sub(desired, this.velocity)
          steer.limit(this.maxForce)
          this.applyForce(steer)
        }

        applyForce(force) {
          const newForce = p5.Vector.div(force, this.mass)
          this.acceleration.add(newForce)
        }

        update() {
          this.velocity.add(this.acceleration)
          this.position.add(this.velocity)
          this.acceleration.mult(0)
        }

        render() {
          let angle = this.velocity.heading()
          p.fill(127)
          p.stroke(0)
          p.push()
          p.translate(this.position.x, this.position.y)
          p.rotate(angle)
          p.beginShape()
          p.vertex(this.r * 1.25, 0)
          p.vertex(-this.r * 1.25, -this.r)
          p.vertex(-this.r * 1.25, this.r)
          p.endShape(p.CLOSE)
          p.pop()
        }
      }
    })
  </script>
</body>
</html>
