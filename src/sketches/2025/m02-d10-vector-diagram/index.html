<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vector diagram</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        class Vector {
          constructor(x, y) {
            this.x = x
            this.y = y
          }
          add(v) {
            this.x = this.x + v.x
            this.y = this.y + v.y
          }
        }

        let position = new Vector(100, 100)
        let velocity = new Vector(1, 3.3)

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          p.background(255)
        }

        p.draw = () => {
          p.background(255)
          position.add(velocity)
          if (position.x > p.width || position.x < 0) velocity.x *= -1
          if (position.y > p.height || position.y < 0) velocity.y *= -1
          p.stroke(0)
          p.fill(127)
          p.circle(position.x, position.y, 48)
        }
      })
    </script>
  </body>
</html>
