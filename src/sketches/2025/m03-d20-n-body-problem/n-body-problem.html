<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>n body problem</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        const G = 1.0
        let bodies = []

        class Body {
          constructor(x, y) {
            this.pos = p.createVector(x, y)
            this.vel = p.createVector(0, 0)
            this.acc = p.createVector(0, 0)
            this.mass = 1
          }
          applyForce(force) {
            this.acc.add(p5.Vector.div(force, this.mass))
          }
          update() {
            this.vel.add(this.acc)
            this.pos.add(this.vel)
            this.vel.limit(10)
            this.acc.mult(0)
          }
          attract(other) {
            let force = p5.Vector.sub(this.pos, other.pos)
            let d = p.constrain(force.mag(), 5, 10)
            force.setMag((G * this.mass * other.mass) / (d * d))
            other.applyForce(force)
          }
          render() {
            p.stroke(0); p.noFill()
            p.circle(this.pos.x, this.pos.y, this.mass * 20)
            p.stroke(255, 0, 0)
            p.line(this.pos.x, this.pos.y, this.pos.x + this.vel.x * 20, this.pos.y + this.vel.y * 20)
          }
        }

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          bodies.push(new Body(320, 40));  bodies[0].vel = p.createVector(1, 0)
          bodies.push(new Body(320, 200)); bodies[1].vel = p.createVector(-1, 0)
          bodies.push(new Body(320, 250))
        }

        p.draw = () => {
          p.background(200)
          for (let i = 0; i < bodies.length; i++)
            for (let j = 0; j < bodies.length; j++)
              if (i !== j) bodies[i].attract(bodies[j])
          for (const body of bodies) { body.update(); body.render() }
        }
      })
    </script>
  </body>
</html>
