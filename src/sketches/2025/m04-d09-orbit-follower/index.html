<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>orbit follower</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
    <script>
      new p5(function (p) {
        let amplitude = 100
        let period = 120
        let mover

        class Mover {
          constructor(x, y, mass) {
            this.pos = p.createVector(x, y)
            this.vel = p.createVector(0, 0)
            this.maxspeed = 4
            this.acc = p.createVector(0, 0)
            this.mass = mass
            this.angle = 0
            this.angleVel = 0
            this.angleAcc = 0.001
          }

          applyForce(force) {
            this.acc.add(p5.Vector.div(force, this.mass))
          }

          update() {
            this.vel.add(this.acc)
            this.vel.limit(this.maxspeed)
            this.pos.add(this.vel)
            this.angleVel += this.angleAcc
            this.angleVel = p.constrain(this.angleVel, -0.3, 0.3)
            this.angle += this.angleVel
            this.acc.mult(0)
          }

          render() {
            p.stroke(0); p.noFill()
            let angle = p.atan2(this.vel.y, this.vel.x)
            p.push()
            p.rectMode(p.CENTER)
            p.translate(this.pos.x, this.pos.y)
            p.rotate(angle)
            p.rect(0, 0, 30, 10)
            p.stroke(255, 0, 0)
            p.line(0, 0, this.vel.mag(), 0)
            p.pop()
          }
        }

        p.setup = () => {
          p.createCanvas(p.windowWidth, p.windowHeight)
          mover = new Mover(p.width / 2, p.height / 2, 1)
        }

        p.draw = () => {
          p.background(200)
          let x = amplitude * p.sin((p.TWO_PI * p.frameCount) / period)
          let y = amplitude * p.cos((p.TWO_PI * p.frameCount) / period)
          const circlePos = p.createVector(p.width / 2 + x, p.height / 2 + y)
          p.circle(circlePos.x, circlePos.y, 16)
          let dir = p5.Vector.sub(circlePos, mover.pos)
          dir.normalize().mult(0.1)
          mover.applyForce(dir)
          mover.update()
          mover.render()
        }
      })
    </script>
  </body>
</html>
