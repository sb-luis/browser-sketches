<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3d grid</title>
  <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
  <script type="module">
    import * as THREE from 'three'

    class Grid {
      constructor(size, divisions) {
        this.size = size
        this.divisions = divisions
      }

      add(scene) {
        const contourMat = new THREE.LineDashedMaterial({
          color: 0xffffff,
          scale: 1,
          dashSize: 1,
          gapSize: 0.5
        })
        const contour = []
        contour.push(new THREE.Vector3(-this.size / 2, 0, -this.size / 2))
        contour.push(new THREE.Vector3(this.size / 2, 0, -this.size / 2))
        contour.push(new THREE.Vector3(this.size / 2, 0, this.size / 2))
        contour.push(new THREE.Vector3(-this.size / 2, 0, this.size / 2))
        contour.push(new THREE.Vector3(-this.size / 2, 0, -this.size / 2))
        const contourGeo = new THREE.BufferGeometry().setFromPoints(contour)
        this.line = new THREE.Line(contourGeo, contourMat)
        this.line.computeLineDistances()
        scene.add(this.line)

        const divisionsMat = new THREE.LineBasicMaterial({ color: 0xffffff })
        const cellSize = this.size / this.divisions
        for (let i = 1; i < this.divisions; i++) {
          const points = []
          points.push(new THREE.Vector3(-this.size / 2, 0, -this.size / 2 + i * cellSize))
          points.push(new THREE.Vector3(this.size / 2, 0, -this.size / 2 + i * cellSize))
          const geometry = new THREE.BufferGeometry().setFromPoints(points)
          scene.add(new THREE.Line(geometry, divisionsMat))
          for (let j = 1; j < this.divisions; j++) {
            const points = []
            points.push(new THREE.Vector3(-this.size / 2 + j * cellSize, 0, -this.size / 2))
            points.push(new THREE.Vector3(-this.size / 2 + j * cellSize, 0, this.size / 2))
            const geometry = new THREE.BufferGeometry().setFromPoints(points)
            scene.add(new THREE.Line(geometry, divisionsMat))
          }
        }
      }
    }

    const renderer = new THREE.WebGLRenderer()
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setClearColor(0xaaaaaa)
    document.body.appendChild(renderer.domElement)

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      1,
      500
    )
    camera.position.set(12, 10, 12)
    camera.lookAt(0, 0, 0)

    const scene = new THREE.Scene()
    const grid = new Grid(10, 8)
    grid.add(scene)

    window.addEventListener('resize', () => {
      const width = window.innerWidth
      const height = window.innerHeight
      renderer.setSize(width, height)
      camera.aspect = width / height
      camera.updateProjectionMatrix()
    })

    renderer.setAnimationLoop(() => {
      renderer.render(scene, camera)
    })
  </script>
</body>
</html>
