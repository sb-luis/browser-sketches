<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>salamander-4</title>
  <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script>
    // https://x.com/TheRujiK
    new p5(function(p) {
      let creature

      p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight)
        creature = new Creature()
      }

      p.draw = () => {
        p.background(200)
        const target = p.createVector(p.mouseX, p.mouseY)
        creature.seek(target)
        creature.update()
        creature.render()
      }

      class Creature {
        constructor() {
          this.position = p.createVector(p.width * 0.5, p.height * 0.5)
          this.velocity = p.createVector(p.random(-1, 1), p.random(-1, 1))
          this.acceleration = p.createVector(0, 0)
          this.joints = []
          this.jointCount = 10
          this.jointDistance = 15
          this.stepDistance = this.jointDistance * 2.5
          this.maxSpeed = this.stepDistance * 0.09
          this.maxForce = 0.1
          this.feetAtIndeces = [1, 5]

          for (let i = 0; i < this.jointCount; i++) {
            const radius = p.map(i, 0, this.jointCount - 1, 10, 2)
            this.joints.push({
              position: p.createVector(this.position.x, this.position.y),
              radius: radius,
              footLeft: p.createVector(this.position.x, this.position.y),
              footRight: p.createVector(this.position.x, this.position.y)
            })

            if (this.feetAtIndeces.includes(i)) {
              this.joints[i].footLeft = p.createVector(this.position.x, this.position.y)
              this.joints[i].footRight = p.createVector(this.position.x, this.position.y)
            }
          }
        }

        seek(target) {
          const desired = p5.Vector.sub(target, this.position)
          const d = desired.mag()
          if (d < 100) {
            const m = p.map(d, 0, 100, 0, this.maxSpeed)
            desired.setMag(m)
          } else {
            desired.setMag(this.maxSpeed)
          }
          const steer = p5.Vector.sub(desired, this.velocity)
          steer.limit(this.maxForce)
          this.applyForce(steer)
        }

        applyForce(force) {
          this.acceleration.add(force)
        }

        update() {
          this.velocity.add(this.acceleration)
          this.velocity.limit(this.maxSpeed)
          this.position.add(this.velocity)
          this.acceleration.mult(0)

          for (let i = 0; i < this.joints.length; i++) {
            let angle

            if (i === 0) {
              this.joints[i].position = p.createVector(this.position.x, this.position.y)
              angle = this.velocity.heading()
            } else {
              const prevJoint = this.joints[i - 1]
              const currentJoint = this.joints[i]
              const direction = p5.Vector.sub(prevJoint.position, currentJoint.position)
              direction.setMag(this.jointDistance)
              currentJoint.position = p5.Vector.sub(prevJoint.position, direction)

              angle = p.atan2(
                this.joints[i - 1].position.y - this.joints[i].position.y,
                this.joints[i - 1].position.x - this.joints[i].position.x
              )
            }

            if (this.feetAtIndeces.includes(i)) {
              const footLeftOffset = p.createVector(
                this.stepDistance * p.cos(angle + p.HALF_PI / 3),
                this.stepDistance * p.sin(angle + p.HALF_PI / 3)
              )
              const footRightOffset = p.createVector(
                this.stepDistance * p.cos(angle - p.HALF_PI / 3),
                this.stepDistance * p.sin(angle - p.HALF_PI / 3)
              )

              if (p5.Vector.dist(this.joints[i].position, this.joints[i].footLeft) > this.stepDistance) {
                this.joints[i].footLeft = p5.Vector.add(this.joints[i].position, footLeftOffset)
              }
              if (p5.Vector.dist(this.joints[i].position, this.joints[i].footRight) > this.stepDistance) {
                this.joints[i].footRight = p5.Vector.add(this.joints[i].position, footRightOffset)
              }
            }
          }
        }

        render() {
          for (let i = 0; i < this.joints.length; i++) {
            p.push()
            p.translate(this.joints[i].position.x, this.joints[i].position.y)
            p.ellipse(0, 0, this.joints[i].radius * 2)
            p.pop()

            if (this.feetAtIndeces.includes(i)) {
              p.stroke(0)
              p.line(
                this.joints[i].position.x, this.joints[i].position.y,
                this.joints[i].footLeft.x, this.joints[i].footLeft.y
              )
              p.line(
                this.joints[i].position.x, this.joints[i].position.y,
                this.joints[i].footRight.x, this.joints[i].footRight.y
              )
              p.noFill()
              p.ellipse(this.joints[i].footLeft.x, this.joints[i].footLeft.y, 5)
              p.ellipse(this.joints[i].footRight.x, this.joints[i].footRight.y, 5)
            }
          }
        }
      }
    })
  </script>
</body>
</html>
