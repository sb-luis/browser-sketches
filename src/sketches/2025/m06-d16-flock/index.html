<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>flock</title>
  <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script>
    new p5(function(p) {
      let flock

      p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight)
        flock = new Flock()
        for (let i = 0; i < 100; i++) {
          let boid = new Boid(p.width * 0.5, p.height * 0.5)
          flock.addBoid(boid)
        }
      }

      p.draw = () => {
        p.background(200)
        flock.run()
      }

      class Flock {
        constructor() {
          this.boids = []
        }

        run() {
          for (let boid of this.boids) {
            boid.run(this.boids)
          }
        }

        addBoid(boid) {
          this.boids.push(boid)
        }
      }

      class Boid {
        constructor(x, y, maxSpeed = 3, maxForce = 0.2) {
          this.position = p.createVector(x, y)
          this.velocity = p.createVector(p.random(), p.random())
          this.acceleration = p.createVector()
          this.maxSpeed = maxSpeed
          this.maxForce = maxForce
          this.mass = 1
          this.r = 8
          this.wanderTheta = 0.0
        }

        run(boids) {
          this.flock(boids)
          this.wrapAoundEdges()
          this.update()
          this.render()
        }

        flock(boids) {
          let separation = this.separate(boids)
          let cohesion = this.cohere(boids)
          let alignment = this.align(boids)

          separation.mult(1.5)
          cohesion.mult(1)
          alignment.mult(1)

          this.applyForce(separation)
          this.applyForce(cohesion)
          this.applyForce(alignment)
        }

        cohere(boids) {
          let neighborDistance = 50
          let sum = p.createVector(0, 0)
          let count = 0
          for (let other of boids) {
            let d = p5.Vector.dist(this.position, other.position)
            if (this !== other && d < neighborDistance) {
              sum.add(other.position)
              count++
            }
          }
          if (count > 0) {
            sum.div(count)
            return this.seek(sum)
          } else {
            return sum
          }
        }

        align(boids) {
          let neighborDistance = 50
          let sum = p.createVector(0, 0)
          let count = 0
          for (let other of boids) {
            let d = p5.Vector.dist(this.position, other.position)
            if (this !== other && d < neighborDistance) {
              sum.add(other.velocity)
              count++
            }
          }
          if (count > 0) {
            sum.div(count)
            sum.setMag(this.maxSpeed)
            let steer = p5.Vector.sub(sum, this.velocity)
            steer.limit(this.maxForce)
            return steer
          } else {
            return sum
          }
        }

        separate(boids) {
          let desiredSeparation = this.r * 2.5
          let sum = p.createVector()
          let count = 0
          for (let other of boids) {
            let d = p5.Vector.dist(this.position, other.position)
            if (this !== other && d < desiredSeparation) {
              let diff = p5.Vector.sub(this.position, other.position)
              diff.setMag(1 / d)
              sum.add(diff)
              count++
            }
          }
          if (count > 0) {
            sum.div(count)
            sum.setMag(this.maxSpeed)
            let steer = p5.Vector.sub(sum, this.velocity)
            steer.limit(this.maxForce)
            return steer
          } else {
            return sum
          }
        }

        wrapAoundEdges() {
          if (this.position.x > p.width) this.position.x = 0
          else if (this.position.x < 0) this.position.x = p.width
          if (this.position.y > p.height) this.position.y = 0
          else if (this.position.y < 0) this.position.y = p.height
        }

        seek(target) {
          const desired = p5.Vector.sub(target, this.position)
          const d = desired.mag()
          if (d < 100) {
            const m = p.map(d, 0, 100, 0, this.maxSpeed)
            desired.setMag(m)
          } else {
            desired.setMag(this.maxSpeed)
          }
          const steer = p5.Vector.sub(desired, this.velocity)
          steer.limit(this.maxForce)
          return steer
        }

        applyForce(force) {
          const newForce = p5.Vector.div(force, this.mass)
          this.acceleration.add(newForce)
        }

        update() {
          this.velocity.add(this.acceleration)
          this.position.add(this.velocity)
          this.acceleration.mult(0)
        }

        render() {
          let angle = this.velocity.heading()
          p.fill(127)
          p.stroke(0)
          p.push()
          p.translate(this.position.x, this.position.y)
          p.rotate(angle)
          p.beginShape()
          p.vertex(this.r * 1, 0)
          p.vertex(-this.r * 1, -this.r)
          p.vertex(-this.r * 1, this.r)
          p.endShape(p.CLOSE)
          p.pop()
        }
      }
    })
  </script>
</body>
</html>
