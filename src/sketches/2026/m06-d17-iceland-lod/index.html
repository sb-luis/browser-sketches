<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iceland — lod</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="map" style="position:relative;">
        <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="metrics">
          <div class="metric-row"><span class="metric-label">resolution</span><span class="metric-value" id="m-lod">—</span></div>
          <div class="metric-row"><span class="metric-label">file size</span><span class="metric-value loading" id="m-size">—</span></div>
          <div class="metric-row"><span class="metric-label">vertices</span><span class="metric-value loading" id="m-verts">—</span></div>
          <div class="metric-row"><span class="metric-label">fetch</span><span class="metric-value loading" id="m-fetch">—</span></div>
          <div class="metric-row"><span class="metric-label">render</span><span class="metric-value loading" id="m-render">—</span></div>
        </div>
      </div>
      <div id="controls">
        <button class="lod-btn" data-lod="110m">110m</button>
        <button class="lod-btn" data-lod="50m">50m</button>
        <button class="lod-btn active" data-lod="10m">10m</button>
      </div>
    </div>

    <script src="./main.js" type="module"></script>
  </body>
</html>
